<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Timeline – NewsDesk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --et-primary: #0A2A38;
  --et-deep: #051E28;
  --et-gold: #E5B83C;
  --et-gold-glow: rgba(229, 184, 60, 0.5);
  --et-teal: #2F9B7A;
  --et-cream: #FFFBF0;
  --et-paper: #FEF7E8;
  --et-graphite: #2C3E3F;
  --et-mid: #8B7A6B;
  --et-dark: #1F2E2A;
  --et-border: rgba(229, 184, 60, 0.25);
  --et-border-strong: rgba(229, 184, 60, 0.5);
  --et-surface: rgba(255, 251, 240, 0.85);
  --et-surface2: rgba(255, 247, 232, 0.95);
  --danger: #E67E22;
  --liked: #2F9B7A;
  --likedlow: rgba(47, 155, 122, 0.12);
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: radial-gradient(ellipse at 15% 25%, #FFFBF0, #FCF3E0 60%, #F5EDD4);
  min-height: 100vh;
  color: var(--et-dark);
}

/* ── Topbar ─────────────────────────────────────────────────────────── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  height: 72px;
  display: flex;
  align-items: center;
  padding: 0 32px;
  gap: 14px;
  background: rgba(255, 251, 240, 0.88);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--et-border);
  box-shadow: 0 4px 24px rgba(10, 42, 56, 0.05), 0 0 0 1px rgba(229, 184, 60, 0.15) inset;
}

.brand {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.05rem;
  font-weight: 800;
  text-decoration: none;
  background: linear-gradient(135deg, var(--et-primary), var(--et-teal));
  color: var(--et-gold);
  padding: 8px 22px;
  border-radius: 50px;
  border: 1px solid var(--et-gold);
  letter-spacing: -0.2px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(10, 42, 56, 0.2);
}

.brand::after {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: linear-gradient(115deg, transparent, rgba(229,184,60,0.25), transparent);
  transform: rotate(30deg);
  animation: shimmerLogo 3s infinite;
}

@keyframes shimmerLogo {
  0% { transform: translateX(-100%) rotate(30deg); }
  100% { transform: translateX(100%) rotate(30deg); }
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--et-mid);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  background: white;
  border: 1px solid var(--et-border);
  border-radius: 40px;
  padding: 8px 18px;
  transition: all 0.2s;
  text-decoration: none;
  box-shadow: 0 2px 8px rgba(10,42,56,0.04);
}

.back-btn:hover {
  border-color: var(--et-gold);
  color: var(--et-primary);
  box-shadow: 0 4px 16px rgba(229,184,60,0.2);
  transform: translateY(-1px);
}

/* ── Container ──────────────────────────────────────────────────────── */
.container {
  max-width: 820px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 6rem;
}

/* ── Topic Header ───────────────────────────────────────────────────── */
.topic-header {
  background: rgba(255, 251, 240, 0.92);
  backdrop-filter: blur(16px);
  border: 1px solid var(--et-border-strong);
  border-radius: 48px;
  padding: 32px 36px;
  margin-bottom: 1.5rem;
  box-shadow: 0 8px 32px rgba(10,42,56,0.07), 0 0 0 1px rgba(229,184,60,0.12) inset;
  position: relative;
  overflow: hidden;
}

.topic-header::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 5px; height: 100%;
  background: linear-gradient(180deg, var(--et-gold), var(--et-teal));
  border-radius: 48px 0 0 48px;
}

.topic-label {
  font-size: 0.65rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--et-gold);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.topic-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--et-border), transparent);
}

.topic-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.5rem;
  font-weight: 800;
  line-height: 1.3;
  margin-bottom: 8px;
  color: var(--et-primary);
}

.topic-meta {
  font-size: 0.78rem;
  color: var(--et-mid);
  margin-bottom: 6px;
  font-weight: 500;
}

.topic-count {
  font-size: 0.78rem;
  color: var(--et-teal);
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--likedlow);
  padding: 4px 14px;
  border-radius: 30px;
  border: 1px solid rgba(47,155,122,0.2);
}

/* ── Action Bar ─────────────────────────────────────────────────────── */
.action-bar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}

.action-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 20px;
  border: 1px solid var(--et-border);
  border-radius: 40px;
  background: white;
  color: var(--et-graphite);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  box-shadow: 0 2px 8px rgba(10,42,56,0.05);
  white-space: nowrap;
}

.action-btn:hover {
  border-color: var(--et-gold);
  color: var(--et-primary);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(229,184,60,0.2);
}

.action-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.action-btn .icon { font-size: 1rem; }

/* Stop Tracking — danger style */
#btnRemove {
  margin-left: auto;
  border-color: rgba(230,126,34,0.3);
  color: var(--danger);
}
#btnRemove:hover {
  background: rgba(230,126,34,0.08);
  border-color: var(--danger);
  color: var(--danger);
  box-shadow: 0 8px 20px rgba(230,126,34,0.15);
}

/* ── Summary Box ────────────────────────────────────────────────────── */
.summary-box {
  background: rgba(255,251,240,0.95);
  border: 1px solid var(--et-border-strong);
  border-left: 5px solid var(--et-gold);
  border-radius: 40px;
  padding: 24px 28px;
  margin-bottom: 1.5rem;
  display: none;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 30px rgba(229,184,60,0.1);
}

.summary-box::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(229,184,60,0.06), transparent);
  animation: neuralScan 4s linear infinite;
}

@keyframes neuralScan {
  0% { left: -100%; }
  100% { left: 200%; }
}

.summary-box.show { display: block; }

.summary-label {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.72rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--et-gold);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.summary-text {
  font-size: 0.9rem;
  line-height: 1.85;
  color: var(--et-graphite);
  white-space: pre-wrap;
}

/* ── Timeline ───────────────────────────────────────────────────────── */
.timeline {
  position: relative;
  padding-left: 2.2rem;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 0.7rem;
  top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, var(--et-gold), rgba(47,155,122,0.4), rgba(229,184,60,0.1));
  border-radius: 2px;
}

.tl-item {
  position: relative;
  margin-bottom: 1.25rem;
  background: white;
  border: 1px solid var(--et-border);
  border-radius: 32px;
  padding: 20px 24px;
  transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  box-shadow: 0 2px 10px rgba(10,42,56,0.04);
}

.tl-item::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 3px;
  background: linear-gradient(90deg, var(--et-gold), var(--et-teal));
  border-radius: 32px 32px 0 0;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.tl-item:hover::before { transform: scaleX(1); }

.tl-item:hover {
  transform: translateX(6px);
  border-color: var(--et-gold);
  box-shadow: 0 8px 28px rgba(229,184,60,0.15);
}

.tl-dot {
  position: absolute;
  left: -2.38rem;
  top: 1.1rem;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--et-gold);
  border: 2px solid var(--et-paper);
  z-index: 1;
  box-shadow: 0 0 0 3px rgba(229,184,60,0.25);
}

.tl-item:first-child .tl-dot {
  width: 15px; height: 15px;
  left: -2.5rem;
  top: 0.95rem;
  background: linear-gradient(135deg, var(--et-gold), var(--et-teal));
  animation: pulseNeural 1.8s infinite;
  box-shadow: 0 0 0 4px rgba(229,184,60,0.2), 0 0 12px rgba(229,184,60,0.4);
}

@keyframes pulseNeural {
  0%, 100% { box-shadow: 0 0 0 4px rgba(229,184,60,0.2), 0 0 12px rgba(229,184,60,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(229,184,60,0.05), 0 0 20px rgba(229,184,60,0.2); }
}

.tl-time {
  font-size: 0.68rem;
  color: var(--et-teal);
  font-weight: 700;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.tl-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.92rem;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 6px;
  cursor: pointer;
  color: var(--et-primary);
  transition: color 0.15s;
}

.tl-title:hover { color: var(--et-teal); }

.tl-desc {
  font-size: 0.8rem;
  line-height: 1.65;
  color: var(--et-mid);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.tl-source {
  font-size: 0.68rem;
  color: var(--et-mid);
  margin-top: 8px;
  font-weight: 500;
  opacity: 0.75;
}

.tl-match {
  display: inline-flex;
  align-items: center;
  font-size: 0.62rem;
  padding: 2px 10px;
  border-radius: 999px;
  background: var(--likedlow);
  color: var(--et-teal);
  font-weight: 700;
  margin-left: 8px;
  border: 1px solid rgba(47,155,122,0.2);
}

/* ── Empty / Loading ────────────────────────────────────────────────── */
.empty {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--et-mid);
  background: white;
  border: 1px solid var(--et-border);
  border-radius: 48px;
  box-shadow: 0 4px 16px rgba(10,42,56,0.04);
}

.empty .icon { font-size: 2.8rem; margin-bottom: 1rem; }

.empty h3 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--et-primary);
  margin-bottom: 6px;
}

.empty p { font-size: 0.85rem; }

.loading {
  text-align: center;
  color: var(--et-mid);
  padding: 3rem;
  font-size: 0.88rem;
  font-weight: 500;
  background: white;
  border: 1px solid var(--et-border);
  border-radius: 48px;
  box-shadow: 0 4px 16px rgba(10,42,56,0.04);
}

/* ── Spinner ────────────────────────────────────────────────────────── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid rgba(10,42,56,0.15);
  border-top-color: var(--et-gold);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

/* ── Toast ──────────────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 100px;
  right: 32px;
  background: rgba(255,251,240,0.96);
  border: 1px solid var(--et-border);
  border-radius: 40px;
  padding: 12px 22px;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--et-dark);
  z-index: 999;
  transform: translateY(10px);
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
  max-width: 300px;
  box-shadow: 0 12px 32px rgba(10,42,56,0.12);
  backdrop-filter: blur(12px);
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.ok { border-color: rgba(47,155,122,0.5); color: var(--et-teal); }
.toast.err { border-color: rgba(230,126,34,0.5); color: var(--danger); }

/* ── Footer ─────────────────────────────────────────────────────────── */
.page-footer {
  max-width: 820px;
  margin: 0 auto;
  padding: 2rem 1.5rem 3rem;
  border-top: 1px solid var(--et-border);
  margin-top: 1rem;
}

.footer-links {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-bottom: 1rem;
}

.footer-link {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 20px;
  border: 1px solid var(--et-border);
  border-radius: 40px;
  background: white;
  color: var(--et-mid);
  font-size: 0.8rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(10,42,56,0.04);
}

.footer-link:hover {
  border-color: var(--et-gold);
  color: var(--et-primary);
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(229,184,60,0.15);
}

.footer-copy {
  text-align: center;
  font-size: 0.7rem;
  color: var(--et-mid);
  opacity: 0.6;
  letter-spacing: 0.3px;
}

/* ── Chat Panel ─────────────────────────────────────────────────────── */
.chat-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(10, 42, 56, 0.35);
  backdrop-filter: blur(4px);
  z-index: 900;
  display: none;
  opacity: 0;
  transition: opacity 0.3s;
}

.chat-panel {
  position: fixed;
  top: 0;
  right: -420px;
  width: 420px;
  max-width: 100%;
  height: 100vh;
  background: var(--et-cream);
  border-left: 1px solid var(--et-border-strong);
  z-index: 901;
  display: flex;
  flex-direction: column;
  transition: right 0.35s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.35s;
  box-shadow: none;
}

body.chat-open .chat-overlay { display: block; opacity: 1; }
body.chat-open .chat-panel {
  right: 0;
  box-shadow: -10px 0 50px rgba(10, 42, 56, 0.15);
}

.chat-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--et-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,251,240,0.95);
  backdrop-filter: blur(12px);
}

.chat-header > div:first-child {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 800;
  font-size: 1rem;
  color: var(--et-primary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.chat-close {
  cursor: pointer;
  color: var(--et-mid);
  transition: all 0.2s;
  padding: 6px 14px;
  border-radius: 30px;
  border: 1px solid var(--et-border);
  font-size: 0.8rem;
  font-weight: 600;
  background: white;
}

.chat-close:hover {
  border-color: var(--et-gold);
  color: var(--et-primary);
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: radial-gradient(ellipse at top, rgba(229,184,60,0.04), transparent 60%), var(--et-paper);
}

.msg {
  max-width: 88%;
  padding: 12px 16px;
  border-radius: 20px;
  font-size: 0.88rem;
  line-height: 1.65;
  white-space: pre-wrap;
}

.msg-ai {
  align-self: flex-start;
  background: white;
  border: 1px solid var(--et-border);
  color: var(--et-dark);
  border-bottom-left-radius: 4px;
  box-shadow: 0 2px 10px rgba(10,42,56,0.06);
}

.msg-user {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--et-primary), var(--et-teal));
  color: white;
  border-bottom-right-radius: 4px;
  box-shadow: 0 4px 14px rgba(10,42,56,0.2);
}

.msg-loading {
  align-self: flex-start;
  background: none;
  color: var(--et-mid);
  font-size: 0.82rem;
  display: flex;
  gap: 8px;
  align-items: center;
}

.chat-input-area {
  padding: 16px;
  border-top: 1px solid var(--et-border);
  background: rgba(255,251,240,0.95);
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.chat-input {
  flex: 1;
  background: white;
  border: 1.5px solid var(--et-border);
  border-radius: 20px;
  padding: 10px 16px;
  color: var(--et-dark);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.88rem;
  resize: none;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  line-height: 1.5;
}

.chat-input:focus {
  border-color: var(--et-gold);
  box-shadow: 0 0 0 4px rgba(229,184,60,0.1);
}

.chat-input::placeholder { color: var(--et-mid); opacity: 0.7; }

.chat-send {
  background: linear-gradient(135deg, var(--et-primary), var(--et-teal));
  color: white;
  border: none;
  border-radius: 16px;
  padding: 10px 20px;
  font-weight: 700;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 12px rgba(10,42,56,0.2);
}

.chat-send:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(229,184,60,0.3);
}

.chat-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ── Bottom accent bar ──────────────────────────────────────────────── */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 52px;
  background: rgba(10, 42, 56, 0.9);
  backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 0.72rem;
  font-weight: 600;
  color: rgba(229,184,60,0.7);
  letter-spacing: 0.5px;
  border-top: 1px solid rgba(229,184,60,0.25);
  z-index: 50;
}

.bottom-bar .live-dot {
  width: 7px; height: 7px;
  background: var(--et-teal);
  border-radius: 50%;
  animation: pulseNeural 1.4s infinite;
  box-shadow: 0 0 8px var(--et-teal);
}
</style>
</head>
<body>

<div class="topbar">
  <a href="/dashboard/" class="brand">NewsDesk</a>
  <a href="/tracking/" class="back-btn">← All Tracked</a>
  <a href="/dashboard/" class="back-btn">🏠 Dashboard</a>
</div>

<div class="container">
  <div class="topic-header">
    <div class="topic-label">📌 Tracking</div>
    <div class="topic-title" id="topicTitle">Loading…</div>
    <div class="topic-meta" id="topicMeta"></div>
    <div class="topic-count" id="topicCount"></div>
  </div>

  <div class="action-bar">
    <button class="action-btn" id="btnChat" onclick="openChat()">
      <span class="icon">💬</span> Chat with AI
    </button>
    <button class="action-btn" id="btnSummarise" onclick="doSummarise()">
      <span class="icon">🤖</span> Summarise Timeline
    </button>
    <button class="action-btn" id="btnRefresh" onclick="loadTimeline()">
      <span class="icon">🔄</span> Refresh
    </button>
    <button class="action-btn" id="btnRemove" onclick="removeTracking()" style="margin-left:auto">
      <span class="icon">✕</span> Stop Tracking
    </button>
  </div>

  <div class="summary-box" id="summaryBox">
    <div class="summary-label">🤖 AI Timeline Summary</div>
    <div class="summary-text" id="summaryText"></div>
  </div>

  <div id="loading" class="loading">Finding related news…</div>
  <div class="timeline" id="timeline" style="display:none"></div>
  <div id="emptyState" style="display:none"></div>
</div>

<!-- Chat Panel -->
<div class="chat-overlay" id="chatOverlay" onclick="closeChat()"></div>
<div class="chat-panel" id="chatPanel">
  <div class="chat-header">
    <div>💬 Timeline AI Chat</div>
    <div class="chat-close" onclick="closeChat()">✕ Close</div>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-area">
    <textarea id="chatInput" class="chat-input" placeholder="Ask about this timeline..." rows="2" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); sendChat();}"></textarea>
    <button class="chat-send" id="chatSendBtn" onclick="sendChat()">Send</button>
  </div>
</div>

<!-- Footer -->
<div class="page-footer">
  <div class="footer-links">
    <a href="/dashboard/" class="footer-link">🏠 Home</a>
    <a href="/tracking/" class="footer-link">📌 All Tracked</a>
    <a href="/preferences/setup" class="footer-link">⚙️ Preferences</a>
  </div>
  <div class="footer-copy">NewsDesk · Your personalised news feed</div>
</div>

<div class="bottom-bar">
  <div class="live-dot"></div>
  NewsDesk Neural Intelligence · Timeline View
</div>

<div class="toast" id="toast"></div>

<script>
const token = localStorage.getItem('access_token');
if(!token) window.location.href = '/auth/login';

let topicData = null;
let timelineArticles = [];

const storedTopic = sessionStorage.getItem('track_topic');
if(storedTopic){
  try{ topicData = JSON.parse(storedTopic); } catch(e){}
}

const pathParts = window.location.pathname.split('/timeline/');
const newsId = pathParts[1] ? decodeURIComponent(pathParts[1]) : null;

if(topicData){
  document.getElementById('topicTitle').textContent = topicData.title || 'Tracked Topic';
  document.getElementById('topicMeta').textContent = `Tracked since: ${topicData.tracked_at || ''}`;
}

async function loadTimeline(){
  if(!newsId){
    document.getElementById('loading').textContent = 'No topic specified.';
    return;
  }
  document.getElementById('loading').style.display = 'block';
  document.getElementById('timeline').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';
  try{
    const r = await fetch(`/tracking/data/${encodeURIComponent(newsId)}`, {
      headers: {'Authorization': `Bearer ${token}`}
    });
    if(!r.ok){
      document.getElementById('loading').textContent = 'Failed to load timeline.';
      return;
    }
    const d = await r.json();
    if(d.topic){
      topicData = d.topic;
      document.getElementById('topicTitle').textContent = d.topic.title || '';
      document.getElementById('topicMeta').textContent = `Tracked since: ${fmtTimeFull(d.topic.tracked_at)}`;
    }
    timelineArticles = d.articles || [];
    document.getElementById('topicCount').textContent = `${d.count} related articles found`;
    document.getElementById('loading').style.display = 'none';
    if(!timelineArticles.length){
      document.getElementById('emptyState').innerHTML = `<div class="empty">
        <div class="icon">🔍</div>
        <h3>No related news found yet</h3>
        <p>We'll keep looking as new articles come in. Check back later!</p>
      </div>`;
      document.getElementById('emptyState').style.display = 'block';
      return;
    }
    renderTimeline(timelineArticles);
  } catch(e){
    document.getElementById('loading').textContent = 'Network error.';
  }
}

function renderTimeline(arts){
  const tl = document.getElementById('timeline');
  let html = '';
  arts.forEach((a, idx) => {
    const time = fmtTimeFull(a.published_time);
    const score = a.match_score || 0;
    html += `
    <div class="tl-item">
      <div class="tl-dot"></div>
      <div class="tl-time">${esc(time)}</div>
      <div class="tl-title" data-tlidx="${idx}">${esc(a.title || 'Untitled')}
        <span class="tl-match">${score} keywords</span>
      </div>
      <div class="tl-desc">${esc(a.short_desc || a.long_desc || '')}</div>
      <div class="tl-source">${esc(a.author || '')} ${a.source ? '· ' + esc(a.source) : ''}</div>
    </div>`;
  });
  tl.innerHTML = html;
  tl.style.display = 'block';
  tl.querySelectorAll('.tl-title[data-tlidx]').forEach(el => {
    el.addEventListener('click', () => {
      const i = parseInt(el.dataset.tlidx);
      const a = timelineArticles[i];
      sessionStorage.setItem('article_data', JSON.stringify(a));
      window.location.href = `/article/read?news_id=${encodeURIComponent(a.news_id || '')}`;
    });
  });
}

let sumController = null;

async function doSummarise(){
  if(!timelineArticles.length){ showToast('No articles to summarise', 'err'); return; }
  const btn = document.getElementById('btnSummarise');
  if(sumController){ sumController.abort(); sumController = null; return; }
  btn.innerHTML = '<span class="spinner" style="border-top-color:var(--danger)"></span> <span style="color:var(--danger)">Stop Generating</span>';
  sumController = new AbortController();
  const summaryBox = document.getElementById('summaryBox');
  const summaryText = document.getElementById('summaryText');
  summaryBox.classList.add('show');
  summaryText.textContent = '';
  try{
    const r = await fetch('/tracking/summarise', {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${token}`},
      body: JSON.stringify({ topic_title: topicData?.title || 'News Topic', articles: timelineArticles.slice(0, 15) }),
      signal: sumController.signal
    });
    if(!r.ok){ showToast('Summarisation failed', 'err'); throw new Error(); }
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      summaryText.textContent += decoder.decode(value, {stream: true});
    }
    showToast('Timeline summarised!', 'ok');
  } catch(e){
    if(e.name === 'AbortError') showToast('Stream stopped', 'ok');
    else showToast('Network error', 'err');
  } finally {
    sumController = null;
    btn.innerHTML = '<span class="icon">🤖</span> Summarise Timeline';
  }
}

let chatHistory = [];

function openChat(){
  if(!timelineArticles.length) return showToast('No articles to chat about yet', 'err');
  document.body.classList.add('chat-open');
  if(chatHistory.length === 0){
    pushMessage('ai', `Hi! I'm your AI tracker. What do you want to safely know about the timeline of "${topicData?.title || 'this topic'}"?`);
  }
}
function closeChat(){ document.body.classList.remove('chat-open'); }

function pushMessage(role, text){
  if(role !== 'loading'){
    chatHistory.push({role: role === 'ai' ? 'assistant' : 'user', content: text});
  }
  renderChat();
}

function renderChat(){
  const box = document.getElementById('chatMessages');
  box.innerHTML = '';
  chatHistory.forEach(m => {
    const isUser = m.role === 'user';
    box.innerHTML += `<div class="msg ${isUser ? 'msg-user' : 'msg-ai'}">${esc(m.content)}</div>`;
  });
  box.scrollTop = box.scrollHeight;
}

let chatController = null;

async function sendChat(){
  const sendBtn = document.getElementById('chatSendBtn');
  if(chatController){ chatController.abort(); chatController = null; return; }
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  pushMessage('user', text);
  const box = document.getElementById('chatMessages');
  const msgId = 'msg-' + Date.now();
  box.innerHTML += `<div class="msg msg-ai" id="${msgId}"><span class="spinner" style="border-top-color:var(--et-gold)"></span> Thinking...</div>`;
  box.scrollTop = box.scrollHeight;
  sendBtn.textContent = 'Stop';
  sendBtn.style.background = 'var(--danger)';
  chatController = new AbortController();
  let fullReply = '';
  try {
    let ctx = `Timeline for ${topicData?.title}:\n`;
    timelineArticles.forEach(a => { ctx += `- ${fmtTime(a.published_time)}: ${a.title}\n`; });
    const r = await fetch('/tracking/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
      body: JSON.stringify({ context_text: ctx, messages: chatHistory }),
      signal: chatController.signal
    });
    if(!r.ok) throw new Error('-');
    document.getElementById(msgId).innerHTML = '';
    const msgEl = document.getElementById(msgId);
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      const chunk = decoder.decode(value, {stream: true});
      fullReply += chunk;
      msgEl.textContent += chunk;
      box.scrollTop = box.scrollHeight;
    }
    chatHistory.push({role: 'assistant', content: fullReply});
  } catch(e) {
    if(e.name === 'AbortError'){
      if(fullReply) chatHistory.push({role: 'assistant', content: fullReply + ' [Stopped]'});
    } else {
      showToast('Chat failed.', 'err');
      chatHistory.pop();
    }
  } finally {
    renderChat();
    chatController = null;
    sendBtn.textContent = 'Send';
    sendBtn.style.background = 'linear-gradient(135deg, var(--et-primary), var(--et-teal))';
    setTimeout(() => input.focus(), 100);
  }
}

async function removeTracking(){
  if(!confirm('Stop tracking this topic?')) return;
  try{
    const r = await fetch(`/tracking/remove/${encodeURIComponent(newsId)}`, {
      method: 'DELETE',
      headers: {'Authorization': `Bearer ${token}`}
    });
    if(r.ok){ showToast('Tracking removed', 'ok'); setTimeout(() => window.location.href = '/tracking/', 800); }
    else showToast('Failed to remove', 'err');
  } catch(e){ showToast('Network error', 'err'); }
}

function fmtTimeFull(s){
  if(!s) return '';
  try{
    const d = new Date(s);
    return d.toLocaleString('en-IN', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
  } catch{ return s; }
}
function fmtTime(s){
  if(!s) return '';
  try{
    const d = new Date(s), now = new Date(), diff = (now - d) / 1000;
    if(diff < 60) return 'just now';
    if(diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if(diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return d.toLocaleDateString('en-IN', {day:'numeric', month:'short'});
  } catch{ return ''; }
}
function esc(s){
  if(typeof s !== 'string') return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let toastT = null;
function showToast(msg, type='ok'){
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast show ${type}`;
  clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 2500);
}

loadTimeline();
</script>
</body>
</html>
