<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NewsDesk — AI Neural Business Intelligence | Economic Times</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --et-primary: #0A2A38;
  --et-deep: #051E28;
  --et-gold: #E5B83C;
  --et-gold-glow: rgba(229, 184, 60, 0.5);
  --et-teal: #2F9B7A;
  --et-cream: #FFFBF0;
  --et-paper: #FEF7E8;
  --et-graphite: #2C3E3F;
  --et-mid: #8B7A6B;
  --et-dark: #1F2E2A;
  --ai-electric: #00D9FF;
  --glass-bg: rgba(255, 251, 240, 0.85);
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: radial-gradient(circle at 20% 30%, #FFFBF0, #FCF3E0);
  min-height: 100vh;
  overflow: hidden;
  color: var(--et-dark);
}

#canvas-container {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* Premium Navigation - Floating Crystal */
.top-nav {
  position: fixed;
  top: 24px;
  left: 28px;
  right: 28px;
  height: 76px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 36px;
  background: var(--glass-bg);
  backdrop-filter: blur(24px);
  border-radius: 80px;
  border: 1px solid rgba(229, 184, 60, 0.4);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(229, 184, 60, 0.2) inset;
  z-index: 100;
  animation: floatNav 0.6s ease-out;
}

@keyframes floatNav {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 20px;
}

.newsdesk-logo {
  background: linear-gradient(135deg, var(--et-primary), var(--et-teal));
  color: var(--et-gold);
  font-weight: 800;
  font-size: 1.1rem;
  padding: 10px 24px;
  border-radius: 50px;
  letter-spacing: -0.2px;
  box-shadow: 0 6px 20px rgba(10, 42, 56, 0.25);
  border: 1px solid var(--et-gold);
  position: relative;
  overflow: hidden;
}

.newsdesk-logo::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(115deg, transparent, rgba(229, 184, 60, 0.2), transparent);
  transform: rotate(30deg);
  animation: shimmerLogo 3s infinite;
}

@keyframes shimmerLogo {
  0% { transform: translateX(-100%) rotate(30deg); }
  100% { transform: translateX(100%) rotate(30deg); }
}

.brand-text {
  font-weight: 800;
  font-size: 1.25rem;
  background: linear-gradient(135deg, var(--et-primary), var(--et-teal));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.ai-badge {
  background: linear-gradient(135deg, rgba(229, 184, 60, 0.2), rgba(47, 155, 122, 0.2));
  padding: 6px 16px;
  border-radius: 40px;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--et-gold);
  border: 1px solid rgba(229, 184, 60, 0.5);
  margin-left: 12px;
  letter-spacing: 0.5px;
  backdrop-filter: blur(4px);
}

.right-stats {
  display: flex;
  gap: 20px;
  align-items: center;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(47, 155, 122, 0.15);
  padding: 8px 20px;
  border-radius: 50px;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--et-teal);
  border: 1px solid rgba(47, 155, 122, 0.4);
  backdrop-filter: blur(4px);
}

.live-dot {
  width: 10px;
  height: 10px;
  background: #2F9B7A;
  border-radius: 50%;
  animation: pulseNeural 1.2s infinite;
  box-shadow: 0 0 12px #2F9B7A;
}

@keyframes pulseNeural {
  0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(47, 155, 122, 0.7); }
  50% { opacity: 0.6; transform: scale(0.9); box-shadow: 0 0 0 6px rgba(47, 155, 122, 0); }
}

.market-chip {
  font-size: 0.75rem;
  font-weight: 700;
  padding: 8px 18px;
  border-radius: 40px;
  background: white;
  border: 1px solid rgba(229, 184, 60, 0.3);
  font-family: monospace;
  transition: all 0.2s;
  cursor: pointer;
}

.market-chip.up { color: var(--et-teal); background: linear-gradient(135deg, white, rgba(47, 155, 122, 0.05)); }
.market-chip.dn { color: #E67E22; background: linear-gradient(135deg, white, rgba(230, 126, 34, 0.05)); }

#liveClock {
  font-family: monospace;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--et-mid);
  background: rgba(0, 0, 0, 0.03);
  padding: 8px 18px;
  border-radius: 40px;
  letter-spacing: 0.5px;
}

/* Dashboard Main Panel - Glass Morph */
.dashboard-panel {
  position: fixed;
  top: 120px;
  right: 28px;
  bottom: 100px;
  width: 400px;
  background: rgba(255, 251, 240, 0.92);
  backdrop-filter: blur(24px);
  border-radius: 48px;
  border: 1px solid rgba(229, 184, 60, 0.4);
  box-shadow: 0 25px 50px rgba(0, 0, 0, 0.08);
  z-index: 90;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: slideInRight 0.7s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes slideInRight {
  from { opacity: 0; transform: translateX(40px); }
  to { opacity: 1; transform: translateX(0); }
}

.panel-header {
  padding: 28px 28px 12px;
  border-bottom: 1px solid rgba(229, 184, 60, 0.2);
}

.panel-header h2 {
  font-size: 1.4rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--et-primary), var(--et-teal));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.panel-header p {
  font-size: 0.7rem;
  color: var(--et-mid);
  margin-top: 6px;
}

.breaking-module {
  background: linear-gradient(115deg, rgba(229, 184, 60, 0.08), rgba(47, 155, 122, 0.05));
  border-radius: 32px;
  padding: 16px 20px;
  margin: 20px 24px;
  border-left: 4px solid var(--et-gold);
  position: relative;
  overflow: hidden;
}

.breaking-header {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 0.65rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--et-gold);
  margin-bottom: 12px;
}

.breaking-track {
  height: 52px;
  position: relative;
  overflow: hidden;
}

.breaking-item {
  position: absolute;
  width: 100%;
  font-weight: 600;
  font-size: 0.85rem;
  color: var(--et-dark);
  line-height: 1.4;
  transition: transform 0.5s cubic-bezier(0.2, 0.85, 0.4, 1), opacity 0.45s;
  opacity: 0;
  transform: translateY(20px);
}

.breaking-item.active {
  opacity: 1;
  transform: translateY(0);
}

.market-dashboard {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 0 24px;
  margin-bottom: 28px;
}

.market-tile {
  background: white;
  border-radius: 28px;
  padding: 14px 12px;
  text-align: center;
  border: 1px solid rgba(229, 184, 60, 0.2);
  transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  cursor: pointer;
}

.market-tile:hover {
  transform: translateY(-4px);
  border-color: var(--et-gold);
  box-shadow: 0 12px 24px rgba(229, 184, 60, 0.15);
}

.tile-label {
  font-size: 0.6rem;
  font-weight: 800;
  text-transform: uppercase;
  color: var(--et-mid);
}

.tile-value {
  font-family: monospace;
  font-weight: 800;
  font-size: 1rem;
  margin-top: 6px;
}

.tile-change {
  font-size: 0.65rem;
  margin-top: 4px;
}
.tile-change.up { color: var(--et-teal); }
.tile-change.down { color: #E67E22; }

/* Feed Container - Scrollable */
.feed-container {
  flex: 1;
  overflow-y: auto;
  padding: 0 20px 20px;
  scrollbar-width: thin;
}

.grid {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.card {
  background: white;
  border-radius: 28px;
  padding: 14px;
  border: 1px solid rgba(229, 184, 60, 0.15);
  transition: all 0.25s;
  cursor: pointer;
}

.card:hover {
  border-color: var(--et-gold);
  transform: translateX(4px);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
}

.card-title {
  font-weight: 700;
  font-size: 0.85rem;
  line-height: 1.35;
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-desc {
  font-size: 0.7rem;
  color: var(--et-mid);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 10px;
}

.card-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.6rem;
  color: var(--et-mid);
}

.cat-pill {
  background: rgba(229, 184, 60, 0.15);
  padding: 3px 10px;
  border-radius: 30px;
  font-weight: 700;
  color: var(--et-gold);
}

.card-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

.read-btn, .bm-btn {
  background: none;
  border: 1px solid rgba(229, 184, 60, 0.3);
  border-radius: 30px;
  padding: 4px 12px;
  font-size: 0.65rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.read-btn:hover, .bm-btn:hover {
  border-color: var(--et-gold);
  background: rgba(229, 184, 60, 0.1);
}

.bm-btn.saved {
  border-color: var(--et-teal);
  color: var(--et-teal);
}

/* Category Bar */
.catbar {
  display: flex;
  gap: 8px;
  padding: 0 24px 12px;
  overflow-x: auto;
  scrollbar-width: none;
  flex-wrap: wrap;
}

.cat-tab {
  background: rgba(255, 255, 255, 0.5);
  border-radius: 40px;
  padding: 6px 16px;
  font-size: 0.7rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.cat-tab.active {
  background: var(--et-gold);
  color: var(--et-primary);
}

/* Ticker Bar */
.ticker-bar {
  position: fixed;
  bottom: 24px;
  left: 28px;
  right: 28px;
  background: rgba(10, 42, 56, 0.88);
  backdrop-filter: blur(24px);
  border-radius: 64px;
  height: 58px;
  display: flex;
  align-items: center;
  z-index: 100;
  border: 1px solid rgba(229, 184, 60, 0.5);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
}

.ticker-label {
  background: linear-gradient(115deg, var(--et-gold), #B8860B);
  color: var(--et-primary);
  padding: 0 36px;
  height: 100%;
  display: flex;
  align-items: center;
  border-radius: 64px 0 0 64px;
  font-weight: 800;
  font-size: 0.75rem;
  letter-spacing: 1.5px;
  gap: 10px;
}

.ticker-scroll {
  flex: 1;
  overflow: hidden;
  mask-image: linear-gradient(90deg, transparent, black 4%, black 96%, transparent);
}

.ticker-items {
  display: flex;
  white-space: nowrap;
  animation: scrollHyperloop 28s linear infinite;
}

.ticker-item {
  display: inline-flex;
  gap: 18px;
  padding: 0 36px;
  border-right: 1px solid rgba(229, 184, 60, 0.4);
  font-size: 0.8rem;
  font-weight: 600;
  color: #FEF7E8;
}

@keyframes scrollHyperloop {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* Toast */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(10, 42, 56, 0.95);
  backdrop-filter: blur(12px);
  padding: 12px 28px;
  border-radius: 60px;
  color: var(--et-gold);
  font-weight: 600;
  font-size: 0.8rem;
  z-index: 200;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  white-space: nowrap;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--et-mid);
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-overlay.open {
  display: flex;
}

.modal-card {
  background: var(--et-cream);
  border-radius: 48px;
  max-width: 480px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  border: 1px solid var(--et-gold);
  padding: 24px;
}

/* Music Control */
.music-control {
  position: fixed;
  bottom: 100px;
  right: 32px;
  z-index: 150;
  background: rgba(10, 42, 56, 0.75);
  backdrop-filter: blur(12px);
  border-radius: 60px;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border: 1px solid rgba(229, 184, 60, 0.4);
  cursor: pointer;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--et-gold);
}

/* Responsive */
@media (max-width: 1000px) {
  .dashboard-panel { width: 360px; right: 16px; top: 100px; bottom: 90px; }
  .top-nav { left: 16px; right: 16px; padding: 0 20px; }
}
@media (max-width: 760px) {
  .dashboard-panel { width: calc(100% - 32px); right: 16px; left: 16px; bottom: 90px; }
  .right-stats .market-chip { display: none; }
}
</style>
</head>
<body>
<div id="canvas-container"></div>

<div class="top-nav">
  <div class="logo-area">
    <div class="newsdesk-logo">NewsDesk</div>
    <div class="brand-text">AI Neural Intelligence <span class="ai-badge">⚡ DEEP LEARNING</span></div>
  </div>
  <div class="right-stats">
    <div class="live-badge"><div class="live-dot"></div> NEURAL LIVE</div>
    <div class="market-chip up" id="niftyChip">NIFTY ▲ 0.68%</div>
    <div class="market-chip dn" id="goldChip">GOLD ▼ 0.09%</div>
    <div id="liveClock">--:-- IST</div>
  </div>
</div>

<div class="dashboard-panel">
  <div class="panel-header">
    <h2>Neural Feed</h2>
    <p>AI-curated intelligence · Real-time</p>
  </div>
  <div class="breaking-module">
    <div class="breaking-header"><div class="live-dot"></div><span>🧠 NEURAL INSIGHT</span></div>
    <div class="breaking-track" id="breakingTrack"></div>
  </div>
  <div class="market-dashboard" id="marketDashboard"></div>
  <div class="catbar" id="catbar"></div>
  <div class="feed-container" id="feed">
    <div class="grid" id="grid"></div>
  </div>
</div>

<div class="ticker-bar">
  <div class="ticker-label"><span>🧠</span> NEURAL MARKET STREAM</div>
  <div class="ticker-scroll"><div class="ticker-items" id="tickerItems"></div></div>
</div>

<div class="music-control" id="musicControl">
  <span class="music-icon">🎵</span>
  <span id="musicStatus">Ambient Neural</span>
  <span id="musicToggle">🔊</span>
</div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal"><div class="modal-card" id="modalContent"></div></div>

<script>
// ========== BACKEND LOGIC (INTACT) ==========
const token = localStorage.getItem('access_token');
const username = localStorage.getItem('username') || 'Reader';
if (!token) window.location.href = '/auth/login';

let articles = [];
let bookmarkedIds = new Set();
let currentKey = 'foryou';
let renderedArticles = [];

// API wrapper
async function api(url, opts = {}) {
  const r = await fetch(url, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) }
  });
  if (r.status === 401) window.location.href = '/auth/login';
  if (!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || r.statusText);
  return r.json();
}

// Load functions
async function loadForYou() {
  currentKey = 'foryou'; setActiveCat('foryou');
  showSkeletons();
  try {
    const d = await api('/dashboard/feed?limit=40');
    articles = d.for_you || [];
    renderArticles(articles);
  } catch(e) { showError(e.message); }
}

async function loadLatest() {
  currentKey = 'latest'; setActiveCat('latest');
  showSkeletons();
  try {
    const d = await api('/dashboard/feed/category/latest_news?limit=40');
    articles = d.articles || [];
    renderArticles(articles);
  } catch(e) { showError(e.message); }
}

async function loadCat(category) {
  currentKey = category; setActiveCat(category);
  showSkeletons();
  try {
    const d = await api(`/dashboard/feed/category/${category}?limit=40`);
    articles = d.articles || [];
    renderArticles(articles);
  } catch(e) { showError(e.message); }
}

async function loadBookmarks() {
  currentKey = 'bookmarks'; setActiveCat('bookmarks');
  showSkeletons();
  try {
    const d = await api('/dashboard/feed/bookmarks');
    articles = d.articles || [];
    renderArticles(articles);
  } catch(e) { showError(e.message); }
}

// Render articles
function renderArticles(arts) {
  const grid = document.getElementById('grid');
  if (!arts.length) {
    grid.innerHTML = `<div class="empty-state">📭 No articles yet. Explore categories above.</div>`;
    return;
  }
  renderedArticles = arts;
  grid.innerHTML = arts.map((a, idx) => {
    const isBm = bookmarkedIds.has(a.news_id);
    const cat = a.category || '';
    return `
      <div class="card" data-idx="${idx}">
        <div class="card-title">${escapeHtml(a.title || 'Untitled')}</div>
        <div class="card-desc">${escapeHtml(a.short_desc || a.long_desc || '')}</div>
        <div class="card-meta">
          <span class="cat-pill">${escapeHtml(cat)}</span>
          <span>${formatTime(a.published_time)}</span>
        </div>
        <div class="card-actions">
          <button class="read-btn" data-readidx="${idx}">Read →</button>
          <button class="bm-btn ${isBm ? 'saved' : ''}" data-bmid="${escapeHtml(a.news_id)}">${isBm ? '🔖 Saved' : '🏷️ Save'}</button>
        </div>
      </div>
    `;
  }).join('');

  // Attach events
  document.querySelectorAll('.card[data-idx]').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.card-actions')) return;
      const idx = parseInt(card.dataset.idx);
      openModal(renderedArticles[idx]);
    });
  });
  document.querySelectorAll('.read-btn[data-readidx]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.readidx);
      goToArticle(renderedArticles[idx]);
    });
  });
  document.querySelectorAll('.bm-btn[data-bmid]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const nid = btn.dataset.bmid;
      await toggleBookmark(nid, btn);
    });
  });
}

async function toggleBookmark(newsId, btn) {
  try {
    const d = await api(`/dashboard/bookmark/${encodeURIComponent(newsId)}`, { method: 'POST' });
    if (d.bookmarked) {
      bookmarkedIds.add(newsId);
      btn.classList.add('saved');
      btn.textContent = '🔖 Saved';
      showToast('Bookmarked!');
    } else {
      bookmarkedIds.delete(newsId);
      btn.classList.remove('saved');
      btn.textContent = '🏷️ Save';
      showToast('Removed');
    }
  } catch(e) { showToast('Failed', true); }
}

function openModal(article) {
  const modal = document.getElementById('modal');
  const content = document.getElementById('modalContent');
  const isBm = bookmarkedIds.has(article.news_id);
  content.innerHTML = `
    <div style="font-weight:800; font-size:1.2rem; margin-bottom:8px;">${escapeHtml(article.title || '')}</div>
    <div style="font-size:0.7rem; color:#8B7A6B; margin-bottom:16px;">${escapeHtml(article.author || '')} · ${formatTime(article.published_time)}</div>
    <div style="font-size:0.85rem; line-height:1.5; margin-bottom:20px;">${escapeHtml(article.long_desc || article.short_desc || '')}</div>
    <div style="display:flex; gap:12px;">
      <button id="modalReadBtn" style="background:#0A2A38; color:white; border:none; border-radius:40px; padding:10px 20px; font-weight:700;">Read Full →</button>
      <button id="modalBmBtn" style="background:none; border:1px solid #E5B83C; border-radius:40px; padding:10px 20px; cursor:pointer;">${isBm ? '🔖 Saved' : '🏷️ Save'}</button>
    </div>
  `;
  modal.classList.add('open');
  document.getElementById('modalReadBtn').onclick = () => goToArticle(article);
  document.getElementById('modalBmBtn').onclick = async () => {
    await toggleBookmark(article.news_id, document.getElementById('modalBmBtn'));
    openModal(article);
  };
}

function goToArticle(article) {
  sessionStorage.setItem('article_data', JSON.stringify(article));

// UI Helpers
function setActiveCat(key) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === key));
}

function formatTime(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return d.toLocaleDateString('en-IN', { day:'numeric', month:'short' });
  } catch { return ''; }
}

function escapeHtml(s) { return String(s).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

}

function showError(msg) {
  document.getElementById('grid').innerHTML = `<div class="empty-state">⚠️ ${escapeHtml(msg)}</div>`;

}

// ========== 3D GLOBE WITH ROTATION + GRID ==========
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xFEF7E8);
scene.fog = new THREE.FogExp2(0xFEF7E8, 0.0008);

const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0.3, 9.5);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

const globeRadius = 3.2;
const geometry = new THREE.SphereGeometry(globeRadius, 128, 128);
const material = new THREE.MeshStandardMaterial({ color: 0xE5B83C, roughness: 0.22, metalness: 0.58, emissive: 0xE5B83C, emissiveIntensity: 0.09 });
const globe = new THREE.Mesh(geometry, material);
scene.add(globe);

// Equator Grid: Horizontal lines
const equatorMat = new THREE.LineBasicMaterial({ color: 0xE5B83C });
const gridMat = new THREE.LineBasicMaterial({ color: 0x2F9B7A, transparent: true, opacity: 0.35 });
[-60, -30, 0, 30, 60].forEach(lat => {
  const rLat = globeRadius * Math.cos(lat * Math.PI/180);
  const yOff = globeRadius * Math.sin(lat * Math.PI/180);
  const pts = [];
  for (let i = 0; i <= 120; i++) {
    const ang = (i / 120) * Math.PI * 2;
    pts.push(new THREE.Vector3(rLat * Math.cos(ang), yOff, rLat * Math.sin(ang)));
  }
  const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
  const line = new THREE.Line(lineGeo, lat === 0 ? equatorMat : gridMat);
  scene.add(line);
});

// Vertical lines (longitudes)
for (let lon = 0; lon < 360; lon += 15) {
  const pts = [];
  for (let i = 0; i <= 60; i++) {
    const lat = -90 + (i / 60) * 180;
    const phi = (90 - lat) * Math.PI/180;
    const theta = lon * Math.PI/180;
    pts.push(new THREE.Vector3(globeRadius * Math.sin(phi) * Math.cos(theta), globeRadius * Math.cos(phi), globeRadius * Math.sin(phi) * Math.sin(theta)));
  }
  const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
  const line = new THREE.Line(lineGeo, gridMat);
  scene.add(line);
}

// Decorative rings
const ring1 = new THREE.Mesh(new THREE.TorusGeometry(globeRadius + 0.22, 0.016, 180, 600), new THREE.MeshStandardMaterial({ color: 0xE5B83C, emissive: 0xE5B83C, emissiveIntensity: 0.5 }));
ring1.rotation.x = Math.PI/2.15;
ring1.rotation.z = 0.6;
scene.add(ring1);

const ring2 = new THREE.Mesh(new THREE.TorusGeometry(globeRadius + 0.48, 0.012, 180, 600), new THREE.MeshStandardMaterial({ color: 0x2F9B7A, emissive: 0x1E6B55, emissiveIntensity: 0.4, transparent: true, opacity: 0.8 }));
ring2.rotation.x = Math.PI/2.6;
ring2.rotation.z = -0.4;
scene.add(ring2);

// Particles
const partCount = 3800;
const partGeo = new THREE.BufferGeometry();
const partPos = [];
for (let i = 0; i < partCount; i++) {
  const r = globeRadius + 0.35 + Math.random() * 1.2;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  partPos.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
}
partGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(partPos), 3));
const partMat = new THREE.PointsMaterial({ color: 0xE5B83C, size: 0.022, transparent: true, opacity: 0.55 });
const particles = new THREE.Points(partGeo, partMat);
scene.add(particles);

// Stars
const starsGeo = new THREE.BufferGeometry();
const starsPos = [];
for (let i = 0; i < 2500; i++) {
  starsPos.push((Math.random() - 0.5) * 500, (Math.random() - 0.5) * 280, (Math.random() - 0.5) * 120 - 60);
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starsPos), 3));
const starsMat = new THREE.PointsMaterial({ color: 0xE5B83C, size: 0.09, transparent: true, opacity: 0.4 });
const starsField = new THREE.Points(starsGeo, starsMat);
scene.add(starsField);

// Lighting
const ambient = new THREE.AmbientLight(0xE8DCC8);
scene.add(ambient);
const mainLight = new THREE.DirectionalLight(0xFFF5E6, 1.2);
mainLight.position.set(6, 7, 5);
scene.add(mainLight);
const backLight = new THREE.PointLight(0xE5B83C, 0.8);
backLight.position.set(0, 1.8, -6.5);
scene.add(backLight);

// Mouse interaction + slow rotation
let targetRotY = 0, currentRotY = 0;
document.addEventListener('mousemove', (e) => { targetRotY = ((e.clientX / window.innerWidth) * 2 - 1) * 0.9; });
let time = 0;
function animate() {
  time += 0.006;
  currentRotY += (targetRotY - currentRotY) * 0.07;
  globe.rotation.y = currentRotY + time * 0.15;
  ring1.rotation.z += 0.002;
  ring2.rotation.x += 0.0018;
  particles.rotation.y = globe.rotation.y * 0.3;
  camera.position.x += (0 - camera.position.x) * 0.04;
  camera.position.y += (Math.sin(time * 0.5) * 0.008 - camera.position.y) * 0.02;
  camera.lookAt(0, 0.1, 0);
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Ambient music
let audioCtx = null, isPlaying = false;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const gain = audioCtx.createGain();
  gain.gain.value = 0.2;
  gain.connect(audioCtx.destination);
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = 82.5;
  osc.connect(gain);
  osc.start();
  audioCtx.resume();
  isPlaying = true;
  document.getElementById('musicToggle').innerHTML = '🔇';
}
function toggleMusic() {
  if (!audioCtx) { initAudio(); return; }
  if (isPlaying) { audioCtx.suspend(); isPlaying = false; document.getElementById('musicToggle').innerHTML = '🔊'; }
  else { audioCtx.resume(); isPlaying = true; document.getElementById('musicToggle').innerHTML = '🔇'; }
}
document.getElementById('musicControl').addEventListener('click', toggleMusic);
document.addEventListener('click', () => { if (!audioCtx) initAudio(); }, { once: true });
