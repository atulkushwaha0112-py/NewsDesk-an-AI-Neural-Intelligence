<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>NewsDesk – AI Dashboard | Economic Times</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --et-primary: #0A2A38;
  --et-deep: #051E28;
  --et-gold: #E5B83C;
  --et-teal: #2F9B7A;
  --et-cream: #FFFBF0;
  --et-paper: #FEF7E8;
  --et-mid: #8B7A6B;
  --et-dark: #1F2E2A;
  --et-red: #8B0000;
  --et-red-deep: #5C0000;
  --et-glass: rgba(255, 251, 240, 0.92);
  --et-glass-dark: rgba(10, 42, 56, 0.85);
  --et-border: rgba(229, 184, 60, 0.25);
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: radial-gradient(circle at 20% 30%, #FFFBF0, #FCF3E0);
  min-height: 100vh;
  overflow-x: hidden;
  color: var(--et-dark);
}

/* Official Economic Times Background Logo - Deep Red */
.background-logo {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 0;
  text-align: center;
  opacity: 0.12;
  pointer-events: none;
  width: 80%;
  max-width: 800px;
}

.background-logo .et-big {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(80px, 20vw, 280px);
  font-weight: 800;
  letter-spacing: -4px;
  background: linear-gradient(135deg, var(--et-red), var(--et-red-deep));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  line-height: 1;
  text-shadow: 0 0 30px rgba(139, 0, 0, 0.2);
}

.background-logo .et-text {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: clamp(16px, 4vw, 32px);
  font-weight: 600;
  letter-spacing: 6px;
  color: var(--et-red);
  margin-top: 10px;
  text-transform: uppercase;
  opacity: 0.9;
}

.background-logo .et-divider {
  width: 120px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--et-red), transparent);
  margin: 20px auto 0;
}

/* Premium Navigation */
.top-nav {
  position: fixed;
  top: 20px;
  left: 24px;
  right: 24px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  background: rgba(255, 251, 240, 0.88);
  backdrop-filter: blur(24px);
  border-radius: 60px;
  border: 1px solid var(--et-border);
  z-index: 100;
  animation: slideDown 0.5s ease-out;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 16px;
}

.newsdesk-logo {
  background: linear-gradient(135deg, var(--et-primary), var(--et-teal));
  color: var(--et-gold);
  font-weight: 800;
  font-size: 1rem;
  padding: 8px 22px;
  border-radius: 50px;
  border: 1px solid var(--et-gold);
}

.brand-text {
  font-weight: 800;
  font-size: 1.1rem;
  background: linear-gradient(135deg, var(--et-primary), var(--et-teal));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.search-wrap {
  flex: 1;
  max-width: 320px;
  position: relative;
  margin: 0 20px;
}

.search-wrap input {
  width: 100%;
  background: white;
  border: 1px solid rgba(229, 184, 60, 0.3);
  border-radius: 40px;
  padding: 10px 16px 10px 38px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.8rem;
  color: var(--et-dark);
  outline: none;
  transition: all 0.2s;
}

.search-wrap input:focus {
  border-color: var(--et-gold);
  box-shadow: 0 0 0 3px rgba(229, 184, 60, 0.1);
}

.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.9rem;
  color: var(--et-mid);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.icon-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: white;
  border: 1px solid rgba(229, 184, 60, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1rem;
  transition: all 0.2s;
  text-decoration: none;
  color: var(--et-mid);
}

.icon-btn:hover {
  border-color: var(--et-gold);
  color: var(--et-gold);
  transform: translateY(-2px);
}

.user-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 16px 5px 8px;
  background: white;
  border: 1px solid rgba(229, 184, 60, 0.3);
  border-radius: 40px;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--et-primary);
  transition: all 0.2s;
  text-decoration: none;
}

.user-chip:hover {
  border-color: var(--et-gold);
  transform: translateY(-2px);
}

.avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--et-gold), var(--et-teal));
  color: var(--et-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 0.8rem;
}

/* Layout */
.layout {
  display: flex;
  padding-top: 100px;
  min-height: 100vh;
  position: relative;
  z-index: 10;
}

/* Sidebar */
.sidebar {
  width: 280px;
  background: rgba(255, 251, 240, 0.88);
  backdrop-filter: blur(20px);
  border-radius: 32px;
  margin: 0 0 20px 24px;
  padding: 20px 0;
  border: 1px solid var(--et-border);
  height: calc(100vh - 120px);
  overflow-y: auto;
  position: sticky;
  top: 100px;
  flex-shrink: 0;
}

.sidebar::-webkit-scrollbar {
  width: 4px;
}

.sidebar::-webkit-scrollbar-track {
  background: rgba(229, 184, 60, 0.1);
  border-radius: 4px;
}

.sidebar::-webkit-scrollbar-thumb {
  background: var(--et-gold);
  border-radius: 4px;
}

.sb-section {
  padding: 12px 16px;
}

.sb-label {
  font-size: 0.65rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--et-gold);
  margin-bottom: 12px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 40px;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--et-mid);
  transition: all 0.2s;
  width: 100%;
  background: none;
  border: none;
  text-align: left;
  font-family: inherit;
}

.nav-item:hover {
  background: rgba(229, 184, 60, 0.1);
  color: var(--et-gold);
}

.nav-item.active {
  background: linear-gradient(135deg, rgba(229, 184, 60, 0.15), rgba(47, 155, 122, 0.1));
  color: var(--et-teal);
}

.nav-icon {
  font-size: 1rem;
  width: 24px;
}

.nav-badge {
  margin-left: auto;
  font-size: 0.65rem;
  background: var(--et-teal);
  color: white;
  border-radius: 20px;
  padding: 2px 8px;
  font-weight: 700;
}

.sb-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--et-gold), transparent);
  margin: 8px 16px;
}

/* Main Content */
.main {
  flex: 1;
  margin: 0 24px 20px 16px;
  overflow-y: auto;
  height: calc(100vh - 120px);
}

.main::-webkit-scrollbar {
  width: 4px;
}

.main::-webkit-scrollbar-track {
  background: rgba(229, 184, 60, 0.1);
  border-radius: 4px;
}

.main::-webkit-scrollbar-thumb {
  background: var(--et-gold);
  border-radius: 4px;
}

/* Category Tabs */
.catbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 24px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(229, 184, 60, 0.2);
}

.cat-tab {
  padding: 8px 20px;
  border-radius: 40px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--et-mid);
  cursor: pointer;
  transition: all 0.2s;
  background: white;
  border: 1px solid rgba(229, 184, 60, 0.2);
}

.cat-tab:hover {
  border-color: var(--et-gold);
  color: var(--et-gold);
}

.cat-tab.active {
  background: linear-gradient(135deg, var(--et-gold), #B8860B);
  border-color: transparent;
  color: var(--et-primary);
}

.cat-tab.liked .tdot {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--et-teal);
  border-radius: 50%;
  margin-right: 6px;
}

/* Feed Grid */
.feed {
  min-height: 400px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
}

/* Article Card */
.card {
  background: white;
  border-radius: 28px;
  overflow: hidden;
  border: 1px solid rgba(229, 184, 60, 0.2);
  transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  cursor: pointer;
  animation: cardFadeIn 0.4s ease-out;
}

@keyframes cardFadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.card:hover {
  transform: translateY(-6px);
  border-color: var(--et-gold);
  box-shadow: 0 20px 35px rgba(229, 184, 60, 0.15);
}

.card-img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  background: var(--et-paper);
}

.card-noimg {
  width: 100%;
  height: 160px;
  background: linear-gradient(135deg, rgba(229, 184, 60, 0.1), rgba(47, 155, 122, 0.05));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
}

.card-body {
  padding: 16px;
}

.card-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.cat-pill {
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 3px 10px;
  border-radius: 20px;
  background: rgba(229, 184, 60, 0.15);
  color: var(--et-gold);
}

.card-time {
  font-size: 0.7rem;
  color: var(--et-mid);
}

.card-title {
  font-size: 1rem;
  font-weight: 700;
  line-height: 1.4;
  color: var(--et-primary);
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-desc {
  font-size: 0.8rem;
  color: var(--et-mid);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 12px;
}

.card-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 12px;
  border-top: 1px solid rgba(229, 184, 60, 0.15);
}

.card-author {
  font-size: 0.7rem;
  color: var(--et-mid);
}

.read-btn {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--et-teal);
  background: none;
  border: 1px solid rgba(47, 155, 122, 0.3);
  padding: 5px 12px;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.2s;
}

.read-btn:hover {
  background: var(--et-teal);
  color: white;
  border-color: var(--et-teal);
}

.bm-btn {
  background: none;
  border: 1px solid rgba(229, 184, 60, 0.3);
  border-radius: 30px;
  padding: 5px 12px;
  cursor: pointer;
  font-size: 0.8rem;
  transition: all 0.2s;
}

.bm-btn:hover {
  border-color: var(--et-gold);
}

.bm-btn.saved {
  background: rgba(47, 155, 122, 0.1);
  border-color: var(--et-teal);
  color: var(--et-teal);
}

/* Skeleton Loading */
@keyframes shimmer {
  0% { background-position: -500px 0; }
  100% { background-position: 500px 0; }
}

.skel-card {
  background: white;
  border-radius: 28px;
  overflow: hidden;
  border: 1px solid rgba(229, 184, 60, 0.2);
}

.skel-img {
  height: 160px;
  background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
  background-size: 500px 100%;
  animation: shimmer 1.3s infinite linear;
}

.skel-body {
  padding: 16px;
}

.skel-line {
  height: 12px;
  background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
  background-size: 500px 100%;
  animation: shimmer 1.3s infinite linear;
  border-radius: 6px;
  margin-bottom: 10px;
}

.skel-line.s { width: 35%; }
.skel-line.m { width: 60%; }
.skel-line.f { width: 100%; }

/* Empty State */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--et-mid);
}

.empty .icon {
  font-size: 3rem;
  margin-bottom: 16px;
}

.empty h3 {
  font-size: 1.1rem;
  margin-bottom: 8px;
  color: var(--et-primary);
}

.empty a {
  color: var(--et-gold);
  text-decoration: none;
}

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-overlay.open {
  display: flex;
}

.modal-card {
  background: var(--et-glass);
  backdrop-filter: blur(24px);
  border-radius: 40px;
  max-width: 550px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  border: 1px solid var(--et-border);
  box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
}

.modal-close {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--et-border);
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--et-mid);
  transition: color 0.2s;
}

.modal-close:hover {
  color: var(--et-gold);
}

.modal-img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.modal-body {
  padding: 24px;
}

.modal-cat {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--et-gold);
  margin-bottom: 8px;
}

.modal-title {
  font-size: 1.3rem;
  font-weight: 800;
  line-height: 1.3;
  color: var(--et-primary);
  margin-bottom: 12px;
}

.modal-meta {
  font-size: 0.75rem;
  color: var(--et-mid);
  margin-bottom: 16px;
}

.modal-desc {
  font-size: 0.9rem;
  line-height: 1.6;
  color: var(--et-dark);
  margin-bottom: 20px;
}

.modal-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.modal-readmore {
  padding: 10px 24px;
  background: linear-gradient(105deg, var(--et-gold), #B8860B);
  border: none;
  border-radius: 40px;
  font-weight: 700;
  font-size: 0.8rem;
  color: var(--et-primary);
  cursor: pointer;
  transition: all 0.2s;
}

.modal-readmore:hover {
  transform: translateY(-2px);
}

.modal-bm {
  padding: 10px 20px;
  background: white;
  border: 1px solid var(--et-border);
  border-radius: 40px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--et-mid);
  cursor: pointer;
  transition: all 0.2s;
}

.modal-bm:hover {
  border-color: var(--et-gold);
  color: var(--et-gold);
}

.modal-bm.saved {
  background: rgba(47, 155, 122, 0.1);
  border-color: var(--et-teal);
  color: var(--et-teal);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: var(--et-glass-dark);
  backdrop-filter: blur(12px);
  border: 1px solid var(--et-border);
  border-radius: 50px;
  padding: 12px 24px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--et-gold);
  z-index: 999;
  transform: translateY(20px);
  opacity: 0;
  transition: all 0.3s;
}

.toast.show {
  transform: translateY(0);
  opacity: 1;
}

.toast.ok { border-left: 3px solid var(--et-teal); }
.toast.err { border-left: 3px solid #E67E22; }

/* Music Control */
.music-control {
  position: fixed;
  bottom: 100px;
  right: 28px;
  z-index: 150;
  background: rgba(10, 42, 56, 0.7);
  backdrop-filter: blur(12px);
  border-radius: 50px;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  border: 1px solid var(--et-border);
  cursor: pointer;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--et-gold);
  transition: all 0.2s;
}

.music-control:hover {
  transform: scale(1.05);
}

/* Official Footer */
.official-footer {
  position: fixed;
  bottom: 20px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 0.7rem;
  color: var(--et-mid);
  z-index: 10;
  pointer-events: none;
  background: transparent;
  padding: 8px;
}

/* Responsive */
@media (max-width: 900px) {
  .sidebar { display: none; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
}

@media (max-width: 600px) {
  .top-nav { padding: 0 16px; }
  .brand-text { display: none; }
  .search-wrap { max-width: 200px; }
  .grid { grid-template-columns: 1fr; }
  .background-logo { width: 95%; }
}
</style>
</head>
<body>

<!-- Official Economic Times Background Logo - Deep Red -->
<div class="background-logo">
  <div class="et-big">ET</div>
  <div class="et-text">THE ECONOMIC TIMES</div>
  <div class="et-divider"></div>
</div>

<div class="top-nav">
  <div class="logo-area">
    <div class="newsdesk-logo">NewsDesk</div>
    <div class="brand-text">AI Neural Intelligence</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" placeholder="Search articles..." oninput="handleSearch(this.value)"/>
  </div>
  <div class="topbar-right">
    <a href="/tracking/" class="icon-btn" title="Tracked">📌</a>
    <div class="icon-btn" title="Bookmarks" onclick="loadBookmarks()">🔖</div>
    <a href="/preferences/setup" class="icon-btn" title="Preferences">⚙️</a>
    <a href="/profile/" class="user-chip" style="text-decoration:none">
      <div class="avatar" id="avatarEl">?</div>
      <span id="usernameEl">...</span>
    </a>
    <div class="icon-btn" title="Logout" onclick="doLogout()">⏻</div>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sb-section">
      <div class="sb-label">My Feed</div>
      <button class="nav-item active" id="nav-foryou" onclick="loadForYou()"><span class="nav-icon">✨</span>For You</button>
      <button class="nav-item" id="nav-latest" onclick="loadLatest()"><span class="nav-icon">⚡</span>Latest</button>
      <button class="nav-item" id="nav-bookmarks" onclick="loadBookmarks()">
        <span class="nav-icon">🔖</span>Bookmarks
        <span class="nav-badge" id="bmBadge" style="display:none">0</span>
      </button>
      <a class="nav-item" href="/tracking/" style="text-decoration:none"><span class="nav-icon">📌</span>Tracked</a>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-section">
      <div class="sb-label">My Categories</div>
      <div id="sbMyCats"></div>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-section">
      <div class="sb-label">Browse All</div>
      <div id="sbAllCats"></div>
    </div>
  </aside>

  <div class="main">
    <div class="catbar" id="catbar">
      <div class="cat-tab active" data-key="foryou" onclick="loadForYou()">✨ For You</div>
      <div class="cat-tab" data-key="latest" onclick="loadLatest()">⚡ Latest</div>
      <div class="cat-tab" data-key="bookmarks" onclick="loadBookmarks()">🔖 Saved</div>
    </div>
    <div class="feed" id="feed">
      <div class="grid" id="grid"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-close" onclick="closeModal()">← Close</div>
    <img class="modal-img" id="mImg" src="" alt=""/>
    <div class="modal-body">
      <div class="modal-cat" id="mCat"></div>
      <div class="modal-title" id="mTitle"></div>
      <div class="modal-meta" id="mMeta"></div>
      <div class="modal-desc" id="mDesc"></div>
      <div class="modal-actions">
        <button class="modal-readmore" id="mReadMore" onclick="goToArticle()">Read Full Article →</button>
        <button class="modal-bm" id="mBmBtn" onclick="toggleBmModal()">🔖 Save</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="music-control" id="musicControl">
  <span>🎵</span>
  <span id="musicStatus">Ambient Neural</span>
  <span id="musicToggle">🔊</span>
</div>

<div class="official-footer">
  © 2026 The Economic Times • NewsDesk AI Intelligence
</div>

<script>
// ========== AMBIENT MUSIC ==========
let audioContext = null;
let isMusicPlaying = false;
let musicGain = null;

function createAmbientMusic() {
  if (audioContext) return;
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  musicGain = audioContext.createGain();
  musicGain.gain.value = 0.2;
  musicGain.connect(audioContext.destination);
  
  const osc1 = audioContext.createOscillator();
  osc1.type = 'sine';
  osc1.frequency.value = 55.0;
  const gain1 = audioContext.createGain();
  gain1.gain.value = 0.18;
  osc1.connect(gain1);
  gain1.connect(musicGain);
  osc1.start();
  
  const osc2 = audioContext.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = 82.5;
  const gain2 = audioContext.createGain();
  gain2.gain.value = 0.14;
  osc2.connect(gain2);
  gain2.connect(musicGain);
  osc2.start();
  
  const lfo = audioContext.createOscillator();
  lfo.type = 'sine';
  lfo.frequency.value = 0.12;
  const lfoGain = audioContext.createGain();
  lfoGain.gain.value = 6;
  lfo.connect(lfoGain);
  lfoGain.connect(osc1.frequency);
  lfo.start();
}

function startMusic() {
  if (!audioContext) createAmbientMusic();
  if (audioContext && !isMusicPlaying) {
    if (audioContext.state === 'suspended') audioContext.resume();
    if (musicGain) musicGain.gain.setValueAtTime(0.2, audioContext.currentTime);
    isMusicPlaying = true;
    document.getElementById('musicToggle').innerHTML = '🔇';
    document.getElementById('musicStatus').innerHTML = 'Playing';
  }
}

function stopMusic() {
  if (audioContext && musicGain && isMusicPlaying) {
    musicGain.gain.setValueAtTime(0, audioContext.currentTime);
    isMusicPlaying = false;
    document.getElementById('musicToggle').innerHTML = '🔊';
    document.getElementById('musicStatus').innerHTML = 'Ambient Neural';
  }
}

function toggleMusic() {
  isMusicPlaying ? stopMusic() : startMusic();
}
document.getElementById('musicControl').addEventListener('click', toggleMusic);

function autoStartMusic() {
  startMusic();
  document.removeEventListener('click', autoStartMusic);
  document.removeEventListener('keydown', autoStartMusic);
}
document.addEventListener('click', autoStartMusic);
document.addEventListener('keydown', autoStartMusic);

// ========== BACKEND VARIABLES (UNTOUCHED) ==========
const token = localStorage.getItem('access_token');
const username = localStorage.getItem('username') || '?';
if (!token) window.location.href = '/auth/login';

const ALL_CATS = {{ all_categories | tojson }};
const GROUPS = {{ category_groups | tojson }};

let articles = [];
let bookmarkedIds = new Set();
let searchQ = '';
let searchTimer = null;
let currentKey = 'foryou';
let renderedArticles = [];

// ========== INIT ==========
async function init() {
  document.getElementById('avatarEl').textContent = username[0].toUpperCase();
  document.getElementById('usernameEl').textContent = username;

  try {
    const me = await api('/auth/me');
    bookmarkedIds = new Set(me.bookmarks || []);
    updateBmBadge();
    buildSidebar(me.liked_categories || []);
    buildTabBar(me.liked_categories || []);
  } catch (e) { console.error(e) }

  showSkeletons();
  loadForYou();
}

async function api(url, opts = {}) {
  const r = await fetch(url, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) }
  });
  if (r.status === 401) window.location.href = '/auth/login';
  if (!r.ok) { const d = await r.json().catch(() => ({})); throw new Error(d.detail || r.statusText) }
  return r.json();
}

// ========== SIDEBAR & TABS ==========
function buildSidebar(liked) {
  const myEl = document.getElementById('sbMyCats');
  const allEl = document.getElementById('sbAllCats');
  myEl.innerHTML = '';
  allEl.innerHTML = '';

  if (!liked.length) {
    myEl.innerHTML = `<div style="font-size:0.75rem;color:var(--et-mid);padding:8px 12px">
      None yet. <a href="/preferences/setup" style="color:var(--et-gold)">Set up</a></div>`;
  }
  liked.forEach(k => {
    myEl.innerHTML += `<button class="nav-item" id="sb_${k}" onclick="loadCat('${k}')">
      <span class="nav-icon">📌</span>${ALL_CATS[k] || k}</button>`;
  });

  for (const [g, keys] of Object.entries(GROUPS)) {
    allEl.innerHTML += `<div class="sb-label" style="margin-top:12px">${g}</div>`;
    keys.forEach(k => {
      allEl.innerHTML += `<button class="nav-item" id="sball_${k}" onclick="loadCat('${k}')">
        <span class="nav-icon">📰</span>${ALL_CATS[k] || k}</button>`;
    });
  }
}

function buildTabBar(liked) {
  const bar = document.getElementById('catbar');
  bar.querySelectorAll('.cat-tab.dynamic').forEach(el => el.remove());
  liked.forEach(k => {
    const t = document.createElement('div');
    t.className = 'cat-tab dynamic liked';
    t.dataset.key = k;
    t.innerHTML = `<span class="tdot"></span>${ALL_CATS[k] || k}`;
    t.onclick = () => loadCat(k);
    bar.appendChild(t);
  });
}

function setActiveTab(key) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.key === key));
}

function setActiveNav(id) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}

// ========== LOAD FUNCTIONS ==========
async function loadForYou() {
  currentKey = 'foryou'; setActiveTab('foryou'); setActiveNav('nav-foryou');
  showSkeletons();
  try {
    const d = await api('/dashboard/feed?limit=60');
    articles = d.for_you || [];
    renderArticles(articles);
  } catch (e) { showError(e.message) }
}

async function loadLatest() {
  currentKey = 'latest'; setActiveTab('latest'); setActiveNav('nav-latest');
  showSkeletons();
  try {
    const d = await api('/dashboard/feed/category/latest_news?limit=40');
    articles = d.articles || [];
    renderArticles(articles, '⚡ Latest News');
  } catch (e) { showError(e.message) }
}

async function loadCat(k) {
  currentKey = k; setActiveTab(k);
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const el = document.getElementById(`sb_${k}`) || document.getElementById(`sball_${k}`);
  if (el) el.classList.add('active');
  showSkeletons();
  try {
    const d = await api(`/dashboard/feed/category/${k}?limit=40`);
    articles = d.articles || [];
    renderArticles(articles, ALL_CATS[k]);
  } catch (e) { showError(e.message) }
}

async function loadBookmarks() {
  currentKey = 'bookmarks'; setActiveTab('bookmarks'); setActiveNav('nav-bookmarks');
  showSkeletons();
  try {
    const d = await api('/dashboard/feed/bookmarks');
    articles = d.articles || [];
    renderArticles(articles, '🔖 Saved Articles');
  } catch (e) { showError(e.message) }
}

// ========== RENDER ==========
function renderArticles(arts, sectionTitle = null) {
  const grid = document.getElementById('grid');
  let filtered = arts;
  if (searchQ) {
    const q = searchQ.toLowerCase();
    filtered = arts.filter(a => (a.title || '').toLowerCase().includes(q) || (a.short_desc || '').toLowerCase().includes(q));
  }
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><div class="icon">📭</div>
      <h3>Nothing here yet</h3>
      <p>Try <a href="/preferences/setup">updating your preferences</a> or browse another category.</p></div>`;
    return;
  }
  let html = '';
  if (sectionTitle) html += `<div style="grid-column:1/-1;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--et-gold);margin-bottom:8px;">${escapeHtml(sectionTitle)}</div>`;

  renderedArticles = filtered;
  filtered.forEach((a, idx) => {
    const bm = bookmarkedIds.has(a.news_id);
    const cat = a.category || ALL_CATS[a._category_key] || '';
    const time = formatTime(a.published_time);
    const nid = a.news_id || '';
    html += `
    <div class="card" data-idx="${idx}">
      ${a.thumbnail ? `<img class="card-img" src="${escapeHtml(a.thumbnail)}" alt="" loading="lazy" onerror="this.style.display='none'">` : `<div class="card-noimg">📰</div>`}
      <div class="card-body">
        <div class="card-meta">
          ${cat ? `<span class="cat-pill">${escapeHtml(cat)}</span>` : ''}
          <span class="card-time">${time}</span>
        </div>
        <div class="card-title">${escapeHtml(a.title || 'Untitled')}</div>
        <div class="card-desc">${escapeHtml(a.short_desc || a.long_desc || '')}</div>
        <div class="card-foot">
          <span class="card-author">${escapeHtml(a.author || a.source || '')}</span>
          <button class="read-btn" data-readidx="${idx}">Read →</button>
          <button class="bm-btn ${bm ? 'saved' : ''}" id="bm_${escapeHtml(nid)}" data-bmid="${escapeHtml(nid)}">${bm ? '🔖' : '🏷️'}</button>
        </div>
      </div>
    </div>`;
  });
  grid.innerHTML = html;

  grid.querySelectorAll('.card[data-idx]').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.card-foot')) return;
      const i = parseInt(card.dataset.idx);
      openModal(renderedArticles[i]);
    });
  });
  grid.querySelectorAll('.read-btn[data-readidx]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const i = parseInt(btn.dataset.readidx);
      goToArticleDirect(renderedArticles[i]);
    });
  });
  grid.querySelectorAll('.bm-btn[data-bmid]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      toggleBm(btn.dataset.bmid, btn);
    });
  });
}

// ========== MODAL ==========
let currentModalArticle = null;

function openModal(a) {
  currentModalArticle = a;
  document.getElementById('mImg').src = a.thumbnail || '';
  document.getElementById('mImg').style.display = a.thumbnail ? 'block' : 'none';
  document.getElementById('mCat').textContent = a.category || '';
  document.getElementById('mTitle').textContent = a.title || '';
  document.getElementById('mMeta').textContent = [a.author, formatTime(a.published_time)].filter(Boolean).join(' · ');
  document.getElementById('mDesc').textContent = a.short_desc || a.long_desc || '';
  const bmBtn = document.getElementById('mBmBtn');
  const isBm = bookmarkedIds.has(a.news_id);
  bmBtn.className = 'modal-bm' + (isBm ? ' saved' : '');
  bmBtn.textContent = isBm ? '🔖 Saved' : '🔖 Save';
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e && e.target && !e.target.classList.contains('modal-overlay')) return;
  document.getElementById('modal').classList.remove('open');
  currentModalArticle = null;
}

function goToArticle() {
  if (!currentModalArticle) return;
  sessionStorage.setItem('article_data', JSON.stringify(currentModalArticle));
  window.location.href = `/article/read?news_id=${encodeURIComponent(currentModalArticle.news_id || '')}`;
}

function goToArticleDirect(a) {
  sessionStorage.setItem('article_data', JSON.stringify(a));
  window.location.href = `/article/read?news_id=${encodeURIComponent(a.news_id || '')}`;
}

async function toggleBmModal() {
  if (!currentModalArticle) return;
  const nid = currentModalArticle.news_id;
  const btn = document.getElementById('mBmBtn');
  try {
    const d = await api(`/dashboard/bookmark/${encodeURIComponent(nid)}`, { method: 'POST' });
    if (d.bookmarked) {
      bookmarkedIds.add(nid); btn.className = 'modal-bm saved'; btn.textContent = '🔖 Saved'; showToast('Bookmarked!', 'ok');
    } else {
      bookmarkedIds.delete(nid); btn.className = 'modal-bm'; btn.textContent = '🔖 Save'; showToast('Removed', 'ok');
    }
    updateBmBadge();
    const cardBtn = document.getElementById(`bm_${nid}`);
    if (cardBtn) {
      if (d.bookmarked) { cardBtn.classList.add('saved'); cardBtn.textContent = '🔖'; }
      else { cardBtn.classList.remove('saved'); cardBtn.textContent = '🏷️'; }
    }
  } catch (e) { showToast('Failed', 'err'); }
}

async function toggleBm(newsId, btn) {
  try {
    const d = await api(`/dashboard/bookmark/${encodeURIComponent(newsId)}`, { method: 'POST' });
    if (d.bookmarked) { bookmarkedIds.add(newsId); btn.classList.add('saved'); btn.textContent = '🔖'; showToast('Bookmarked!', 'ok'); }
    else { bookmarkedIds.delete(newsId); btn.classList.remove('saved'); btn.textContent = '🏷️'; showToast('Removed', 'ok'); }
    updateBmBadge();
  } catch (e) { showToast('Failed', 'err'); }
}

function updateBmBadge() {
  const el = document.getElementById('bmBadge');
  if (bookmarkedIds.size) { el.textContent = bookmarkedIds.size; el.style.display = 'inline'; }
  else el.style.display = 'none';
}

// ========== SEARCH ==========
function handleSearch(v) {
  searchQ = v.trim();
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => renderArticles(articles), 200);
}

// ========== SKELETONS ==========
function showSkeletons(n = 12) {
  document.getElementById('grid').innerHTML = Array.from({ length: n }, () => `
    <div class="skel-card">
      <div class="skel-img"></div>
      <div class="skel-body">
        <div class="skel-line s" style="margin-bottom:10px"></div>
        <div class="skel-line f"></div>
        <div class="skel-line m"></div>
        <div class="skel-line f" style="margin-top:10px"></div>
      </div>
    </div>`).join('');
}

function showError(msg) {
  document.getElementById('grid').innerHTML = `<div class="empty"><div class="icon">⚠️</div>
    <h3>Could not load</h3><p>${escapeHtml(msg)}</p></div>`;
}

// ========== HELPERS ==========
function formatTime(s) {
  if (!s) return '';
  try {
    const d = new Date(s), now = new Date(), diff = (now - d) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
  } catch { return '' }
}

function escapeHtml(s) {
  if (typeof s !== 'string') return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

let toastTimer = null;
function showToast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast show ${type}`;
  clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

async function doLogout() {
  await fetch('/auth/logout', { method: 'POST' });
  localStorage.removeItem('access_token');
  localStorage.removeItem('username');
  window.location.href = '/auth/login';
}

init();
</script>
</body>
</html>
