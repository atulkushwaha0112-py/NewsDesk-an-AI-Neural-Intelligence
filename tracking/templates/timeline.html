<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Timeline – NewsDesk</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;--surface:#111118;--surface2:#18181f;--border:#1f1f2e;--border2:#2a2a3a;
  --accent:#f97316;--accent2:#fb923c;--accentlow:rgba(249,115,22,.12);
  --text:#f0eff0;--text2:#a1a1b5;--text3:#4a4a62;
  --liked:#22c55e;--likedlow:rgba(34,197,94,.1);
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

.topbar{height:54px;background:var(--surface);border-bottom:1px solid var(--border);
display:flex;align-items:center;padding:0 1.25rem;gap:.75rem}
.brand{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;letter-spacing:-.02em;text-decoration:none;color:var(--text)}
.brand span{color:var(--accent)}
.back-btn{display:flex;align-items:center;gap:.3rem;color:var(--text2);font-size:.85rem;
cursor:pointer;background:none;border:1px solid var(--border);border-radius:7px;padding:.35rem .7rem;
transition:all .15s;text-decoration:none}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}

.container{max-width:800px;margin:0 auto;padding:2rem 1.25rem 4rem}

/* Topic header */
.topic-header{margin-bottom:1.5rem}
.topic-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
color:var(--accent);margin-bottom:.4rem}
.topic-title{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;line-height:1.35;margin-bottom:.4rem}
.topic-meta{font-size:.8rem;color:var(--text3);margin-bottom:1rem}
.topic-count{font-size:.8rem;color:var(--text2)}

/* Action bar */
.action-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
.action-btn{display:flex;align-items:center;gap:.4rem;padding:.5rem .9rem;
border:1px solid var(--border);border-radius:8px;background:var(--surface);
color:var(--text2);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;
cursor:pointer;transition:all .15s}
.action-btn:hover{border-color:var(--accent);color:var(--accent)}
.action-btn:disabled{opacity:.5;cursor:not-allowed}
.action-btn .icon{font-size:1rem}

/* Summary box */
.summary-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;
padding:1.25rem;margin-bottom:1.5rem;display:none}
.summary-box.show{display:block}
.summary-label{font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;
color:var(--accent);margin-bottom:.6rem;display:flex;align-items:center;gap:.4rem}
.summary-text{font-size:.88rem;line-height:1.8;color:var(--text2);white-space:pre-wrap}

/* Timeline */
.timeline{position:relative;padding-left:2rem}
.timeline::before{content:'';position:absolute;left:.65rem;top:0;bottom:0;width:2px;
background:linear-gradient(to bottom,var(--accent),var(--border2),var(--border))}

.tl-item{position:relative;margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid transparent}
.tl-item:last-child{margin-bottom:0}

.tl-dot{position:absolute;left:-1.6rem;top:.4rem;width:10px;height:10px;border-radius:50%;
background:var(--accent);border:2px solid var(--bg);z-index:1}
.tl-item:first-child .tl-dot{width:13px;height:13px;left:-1.7rem;top:.3rem}

.tl-time{font-size:.7rem;color:var(--accent2);font-weight:600;margin-bottom:.35rem}
.tl-title{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;line-height:1.35;
margin-bottom:.3rem;cursor:pointer;transition:color .15s}
.tl-title:hover{color:var(--accent)}
.tl-desc{font-size:.8rem;line-height:1.6;color:var(--text3);
display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tl-source{font-size:.68rem;color:var(--text3);margin-top:.3rem}
.tl-match{display:inline-block;font-size:.6rem;padding:.1rem .35rem;border-radius:999px;
background:var(--likedlow);color:var(--liked);font-weight:600;margin-left:.4rem}

/* Empty */
.empty{text-align:center;padding:3rem 1rem;color:var(--text3)}
.empty .icon{font-size:2.5rem;margin-bottom:.75rem}
.empty h3{font-family:'Syne',sans-serif;color:var(--text2);margin-bottom:.4rem}

/* Loading spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);
border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}

/* Toast */
.toast{position:fixed;bottom:1.25rem;right:1.25rem;background:var(--surface2);border:1px solid var(--border2);
border-radius:9px;padding:.65rem .9rem;font-size:.82rem;color:var(--text);z-index:999;
transform:translateY(6px);opacity:0;transition:all .25s;max-width:280px;box-shadow:0 8px 20px rgba(0,0,0,.4)}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:rgba(34,197,94,.4)}.toast.err{border-color:rgba(239,68,68,.4)}

.loading{text-align:center;color:var(--text3);padding:2rem;font-size:.85rem}

/* Footer */
.page-footer{max-width:800px;margin:0 auto;padding:1.5rem 1.25rem 2.5rem;
border-top:1px solid var(--border);margin-top:2rem}
.footer-links{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center;margin-bottom:.75rem}
.footer-link{display:flex;align-items:center;gap:.3rem;padding:.4rem .8rem;
border:1px solid var(--border);border-radius:7px;background:var(--surface);
color:var(--text2);font-size:.8rem;text-decoration:none;transition:all .15s}
.footer-link:hover{border-color:var(--accent);color:var(--accent)}
.footer-copy{text-align:center;font-size:.7rem;color:var(--text3)}

/* Chat Panel */
.chat-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:900;display:none;opacity:0;transition:opacity .3s}
.chat-panel{position:fixed;top:0;right:-400px;width:400px;max-width:100%;height:100vh;background:var(--surface);
border-left:1px solid var(--border);z-index:901;display:flex;flex-direction:column;transition:right .3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow .3s}
body.chat-open .chat-overlay{display:block;opacity:1}
body.chat-open .chat-panel{right:0;box-shadow:-5px 0 25px rgba(0,0,0,.5)}
.chat-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;
font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;color:var(--text);background:var(--surface2)}
.chat-close{cursor:pointer;color:var(--text2);transition:color .2s;padding:.2rem}
.chat-close:hover{color:var(--accent)}
.chat-messages{flex:1;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:1rem}
.msg{max-width:85%;padding:.7rem 1rem;border-radius:12px;font-size:.92rem;line-height:1.6;white-space:pre-wrap}
.msg-ai{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:2px}
.msg-user{align-self:flex-end;background:var(--accentlow);border:1px solid rgba(249,115,22,.2);color:var(--accent);border-bottom-right-radius:2px}
.msg-loading{align-self:flex-start;background:none;color:var(--text3);font-size:.85rem;display:flex;gap:.4rem;align-items:center}
.chat-input-area{padding:1rem;border-top:1px solid var(--border);background:var(--surface2);display:flex;gap:.5rem}
.chat-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.6rem;color:var(--text);
font-family:inherit;font-size:.9rem;resize:none;outline:none}
.chat-input:focus{border-color:var(--accent)}
.chat-send{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:0 1.2rem;font-weight:600;font-family:inherit;cursor:pointer;transition:background .2s}
.chat-send:hover{background:var(--accent2)}
.chat-send:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>

<div class="topbar">
  <a href="/dashboard/" class="brand">News<span>Desk</span></a>
  <a href="/tracking/" class="back-btn">← All Tracked</a>
  <a href="/dashboard/" class="back-btn">🏠 Dashboard</a>
</div>

<div class="container">
  <!-- Topic header -->
  <div class="topic-header">
    <div class="topic-label">📌 Tracking</div>
    <div class="topic-title" id="topicTitle">Loading…</div>
    <div class="topic-meta" id="topicMeta"></div>
    <div class="topic-count" id="topicCount"></div>
  </div>

  <!-- Actions -->
  <div class="action-bar">
    <button class="action-btn" id="btnChat" onclick="openChat()">
      <span class="icon">💬</span> Chat with AI
    </button>
    <button class="action-btn" id="btnSummarise" onclick="doSummarise()">
      <span class="icon">🤖</span> Summarise Timeline
    </button>
    <button class="action-btn" id="btnRefresh" onclick="loadTimeline()">
      <span class="icon">🔄</span> Refresh
    </button>
    <button class="action-btn" id="btnRemove" onclick="removeTracking()" style="margin-left:auto">
      <span class="icon">✕</span> Stop Tracking
    </button>
  </div>

  <!-- Summary box -->
  <div class="summary-box" id="summaryBox">
    <div class="summary-label">🤖 AI Timeline Summary</div>
    <div class="summary-text" id="summaryText"></div>
  </div>

  <!-- Timeline -->
  <div id="loading" class="loading">Finding related news…</div>
  <div class="timeline" id="timeline" style="display:none"></div>
  <div id="emptyState" style="display:none"></div>
</div>

<!-- Chat Panel -->
<div class="chat-overlay" id="chatOverlay" onclick="closeChat()"></div>
<div class="chat-panel" id="chatPanel">
  <div class="chat-header">
    <div>💬 Timeline AI Chat</div>
    <div class="chat-close" onclick="closeChat()">✕</div>
  </div>
  <div class="chat-messages" id="chatMessages">
    <!-- Messages -->
  </div>
  <div class="chat-input-area">
    <textarea id="chatInput" class="chat-input" placeholder="Ask about this timeline..." rows="2" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); sendChat();}"></textarea>
    <button class="chat-send" id="chatSendBtn" onclick="sendChat()">Send</button>
  </div>
</div>

<!-- Footer -->
<div class="page-footer">
  <div class="footer-links">
    <a href="/dashboard/" class="footer-link">🏠 Home</a>
    <a href="/tracking/" class="footer-link">📌 All Tracked</a>
    <a href="/preferences/setup" class="footer-link">⚙️ Preferences</a>
  </div>
  <div class="footer-copy">NewsDesk · Your personalised news feed</div>
</div>

<div class="toast" id="toast"></div>

<script>
const token = localStorage.getItem('access_token');
if(!token) window.location.href = '/auth/login';

let topicData = null;
let timelineArticles = [];

// Get topic from sessionStorage or URL
const storedTopic = sessionStorage.getItem('track_topic');
if(storedTopic){
  try{ topicData = JSON.parse(storedTopic); } catch(e){}
}

// Extract news_id from URL
const pathParts = window.location.pathname.split('/timeline/');
const newsId = pathParts[1] ? decodeURIComponent(pathParts[1]) : null;

if(topicData){
  document.getElementById('topicTitle').textContent = topicData.title || 'Tracked Topic';
  document.getElementById('topicMeta').textContent = `Tracked since: ${topicData.tracked_at || ''}`;
}

async function loadTimeline(){
  if(!newsId){
    document.getElementById('loading').textContent = 'No topic specified.';
    return;
  }

  document.getElementById('loading').style.display = 'block';
  document.getElementById('timeline').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';

  try{
    const r = await fetch(`/tracking/data/${encodeURIComponent(newsId)}`, {
      headers: {'Authorization': `Bearer ${token}`}
    });
    if(!r.ok){
      document.getElementById('loading').textContent = 'Failed to load timeline.';
      return;
    }
    const d = await r.json();

    // Update header with topic info
    if(d.topic){
      topicData = d.topic;
      document.getElementById('topicTitle').textContent = d.topic.title || '';
      document.getElementById('topicMeta').textContent = `Tracked since: ${fmtTimeFull(d.topic.tracked_at)}`;
    }

    timelineArticles = d.articles || [];
    document.getElementById('topicCount').textContent = `${d.count} related articles found`;
    document.getElementById('loading').style.display = 'none';

    if(!timelineArticles.length){
      document.getElementById('emptyState').innerHTML = `<div class="empty">
        <div class="icon">🔍</div>
        <h3>No related news found yet</h3>
        <p>We'll keep looking as new articles come in. Check back later!</p>
      </div>`;
      document.getElementById('emptyState').style.display = 'block';
      return;
    }

    renderTimeline(timelineArticles);
  } catch(e){
    document.getElementById('loading').textContent = 'Network error.';
  }
}

function renderTimeline(arts){
  const tl = document.getElementById('timeline');
  let html = '';

  arts.forEach((a, idx) => {
    const time = fmtTimeFull(a.published_time);
    const score = a.match_score || 0;
    html += `
    <div class="tl-item">
      <div class="tl-dot"></div>
      <div class="tl-time">${esc(time)}</div>
      <div class="tl-title" data-tlidx="${idx}">${esc(a.title || 'Untitled')}
        <span class="tl-match">${score} keywords</span>
      </div>
      <div class="tl-desc">${esc(a.short_desc || a.long_desc || '')}</div>
      <div class="tl-source">${esc(a.author || '')} ${a.source ? '· ' + esc(a.source) : ''}</div>
    </div>`;
  });

  tl.innerHTML = html;
  tl.style.display = 'block';

  // Click on title to go to article
  tl.querySelectorAll('.tl-title[data-tlidx]').forEach(el => {
    el.addEventListener('click', () => {
      const i = parseInt(el.dataset.tlidx);
      const a = timelineArticles[i];
      sessionStorage.setItem('article_data', JSON.stringify(a));
      window.location.href = `/article/read?news_id=${encodeURIComponent(a.news_id || '')}`;
    });
  });
}

// ── Summarise ────────────────────────────────────────────────────────────────
let sumController = null;

async function doSummarise(){
  if(!timelineArticles.length){
    showToast('No articles to summarise', 'err');
    return;
  }

  const btn = document.getElementById('btnSummarise');
  
  if(sumController){
    sumController.abort();
    sumController = null;
    return;
  }

  btn.innerHTML = '<span class="spinner" style="border-top-color:var(--danger)"></span> <span style="color:var(--danger)">Stop Generating</span>';
  
  sumController = new AbortController();
  const summaryBox = document.getElementById('summaryBox');
  const summaryText = document.getElementById('summaryText');
  summaryBox.classList.add('show');
  summaryText.textContent = '';

  try{
    const r = await fetch('/tracking/summarise', {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${token}`},
      body: JSON.stringify({
        topic_title: topicData?.title || 'News Topic',
        articles: timelineArticles.slice(0, 15),
      }),
      signal: sumController.signal
    });
    if(!r.ok){ showToast('Summarisation failed', 'err'); throw new Error(); }

    const reader = r.body.getReader();
    const decoder = new TextDecoder();

    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      summaryText.textContent += decoder.decode(value, {stream: true});
    }
    showToast('Timeline summarised!', 'ok');
  } catch(e){
    if(e.name === 'AbortError') showToast('Stream stopped', 'ok');
    else showToast('Network error', 'err');
  } finally {
    sumController = null;
    btn.innerHTML = '<span class="icon">🤖</span> Summarise Timeline';
  }
}

// ── Chat AI ──────────────────────────────────────────────────────────────────
let chatHistory = [];

function openChat(){
  if(!timelineArticles.length) return showToast('No articles to chat about yet', 'err');
  document.body.classList.add('chat-open');
  if(chatHistory.length === 0){
    pushMessage('ai', `Hi! I'm your AI tracker. What do you want to safely know about the timeline of "${topicData?.title || 'this topic'}"?`);
  }
}
function closeChat(){
  document.body.classList.remove('chat-open');
}

function pushMessage(role, text){
  if(role !== 'loading'){
    chatHistory.push({role: role === 'ai' ? 'assistant' : 'user', content: text});
  }
  renderChat();
}

function renderChat(){
  const box = document.getElementById('chatMessages');
  box.innerHTML = '';
  chatHistory.forEach(m => {
    const isUser = m.role === 'user';
    box.innerHTML += `<div class="msg ${isUser ? 'msg-user' : 'msg-ai'}">${esc(m.content)}</div>`;
  });
  box.scrollTop = box.scrollHeight;
}

let chatController = null;

async function sendChat(){
  const sendBtn = document.getElementById('chatSendBtn');
  if(chatController){
    chatController.abort();
    chatController = null;
    return;
  }

  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;

  input.value = '';
  pushMessage('user', text);

  const box = document.getElementById('chatMessages');
  const msgId = 'msg-' + Date.now();
  box.innerHTML += `<div class="msg msg-ai" id="${msgId}"><span class="spinner" style="border-top-color:var(--accent)"></span> Thinking...</div>`;
  box.scrollTop = box.scrollHeight;
  
  sendBtn.textContent = 'Stop';
  sendBtn.style.background = 'var(--danger)';
  
  chatController = new AbortController();
  let fullReply = '';

  try {
    let ctx = `Timeline for ${topicData?.title}:\n`;
    timelineArticles.forEach(a => {
      ctx += `- ${fmtTime(a.published_time)}: ${a.title}\n`;
    });

    const r = await fetch('/tracking/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
      body: JSON.stringify({ context_text: ctx, messages: chatHistory }),
      signal: chatController.signal
    });
    
    if(!r.ok) throw new Error('-');

    document.getElementById(msgId).innerHTML = ''; // clear spinner
    const msgEl = document.getElementById(msgId);
    
    const reader = r.body.getReader();
    const decoder = new TextDecoder();

    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      const chunk = decoder.decode(value, {stream: true});
      fullReply += chunk;
      msgEl.textContent += chunk; 
      box.scrollTop = box.scrollHeight;
    }
    chatHistory.push({role: 'assistant', content: fullReply});
  } catch(e) {
    if(e.name === 'AbortError'){
      if(fullReply) chatHistory.push({role: 'assistant', content: fullReply + ' [Stopped]'});
    } else {
      showToast('Chat failed.', 'err');
      chatHistory.pop(); // Remove the user message since it failed completely
    }
  } finally {
    renderChat(); // Re-render to safely escape all accumulated HTML
    chatController = null;
    sendBtn.textContent = 'Send';
    sendBtn.style.background = 'var(--accent)';
    setTimeout(() => input.focus(), 100);
  }
}

// ── Remove tracking ──────────────────────────────────────────────────────────
async function removeTracking(){
  if(!confirm('Stop tracking this topic?')) return;
  try{
    const r = await fetch(`/tracking/remove/${encodeURIComponent(newsId)}`, {
      method: 'DELETE',
      headers: {'Authorization': `Bearer ${token}`}
    });
    if(r.ok){
      showToast('Tracking removed', 'ok');
      setTimeout(() => window.location.href = '/tracking/', 800);
    } else {
      showToast('Failed to remove', 'err');
    }
  } catch(e){ showToast('Network error', 'err'); }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmtTimeFull(s){
  if(!s) return '';
  try{
    const d = new Date(s);
    return d.toLocaleString('en-IN', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
  } catch{ return s; }
}
function fmtTime(s){
  if(!s) return '';
  try{
    const d = new Date(s), now = new Date(), diff = (now - d) / 1000;
    if(diff < 60) return 'just now';
    if(diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if(diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return d.toLocaleDateString('en-IN', {day:'numeric', month:'short'});
  } catch{ return ''; }
}
function esc(s){
  if(typeof s !== 'string') return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let toastT = null;
function showToast(msg, type='ok'){
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast show ${type}`;
  clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 2500);
}

loadTimeline();
</script>
</body>
</html>
